<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar" aria-label="{{ site.name }} home"><img src="{{ site.avatar }}" alt="{{ site.name }}" /></a>

          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav class="site-nav" aria-label="Primary navigation">
            <a href="{{ site.baseurl }}/">Work</a>
            <a href="{{ site.baseurl }}/about/">About</a>
            <a href="https://github.com/rwcunningham" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="{{ '/assets/docs/Robert-Cunningham-Resume.pdf' | relative_url }}">Resume</a>
            <a href="https://www.youtube.com/@RobertWilliamCunningham" target="_blank" rel="noopener noreferrer">YouTube</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          <p>&copy; {{ site.time | date: "%Y" }} {{ site.name }}. Built with Jekyll.</p>
          <div class="footer-links">
            <a href="{{ site.baseurl }}/feed.xml">RSS</a>
            <a href="https://github.com/rwcunningham" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="{{ site.baseurl }}/about/">About</a>
          </div>
        </footer>
      </div>
    </div>

    {% include analytics.html %}
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>

---
layout: default
---

<article class="post">
  {% if page.image %}
    <img class="post-hero" src="{{ page.image | relative_url }}" alt="{{ page.title }}" />
  {% endif %}

  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>
